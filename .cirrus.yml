task:
  name: Build VoltageOS 16.2 (Tetris)
  timeout_in: 120m
  container:
    image: aospstudio/aosp-build:latest
    cpu: 8
    memory: 24G

  sync_script:
    - mkdir -p ~/bin
    - curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
    - chmod a+x ~/bin/repo
    - export PATH=$PATH:~/bin
    - repo init -u https://github.com/mucache/manifest.git -b 16.2 --depth=1
    - mkdir -p .repo/local_manifests
    - curl -s https://raw.githubusercontent.com/mucache/android_build_tetris/main/roomservice.xml > .repo/local_manifests/tetris.xml
    - repo sync -c -j8 --force-sync --no-clone-bundle --no-tags

  build_script:
    - export PATH=$PATH:~/bin
    - source build/envsetup.sh
    - lunch lineage_Tetris-userdebug
    - mka bacon
# Triggering Cirrus CI Build
