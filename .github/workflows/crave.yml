name: Crave ROM Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Crave
        run: |
          mkdir -p ${HOME}/bin
          curl -sL https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          mv crave ${HOME}/bin/
          echo "${HOME}/bin" >> $GITHUB_PATH

      - name: Create crave.conf (Flat Format Fix)
        env:
          C_USER: ${{ secrets.CRAVE_USERNAME }}
          C_TOKEN: ${{ secrets.CRAVE_TOKEN }}
        run: |
          # The Crave tool EXPECTS a flat JSON with 'username' and 'token'
          python3 -c "import json, os; print(json.dumps({'''username''': os.environ['''C_USER'''], '''token''': os.environ['''C_TOKEN''']}))" > ${HOME}/crave.conf
          cp ${HOME}/crave.conf ${HOME}/.crave.conf

      - name: Run Build
        run: |
          # Pass the config explicitly with -c to be 100% sure
          crave -c ${HOME}/crave.conf run --clean
