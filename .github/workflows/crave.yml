name: Crave ROM Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Crave
        run: |
          mkdir -p ${HOME}/bin
          curl -sL https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          mv crave ${HOME}/bin/
          echo "${HOME}/bin" >> $GITHUB_PATH

      - name: Debug Crave Tool
        run: |
          crave version
          crave help || true

      - name: Create crave.conf (Full JSON Hack)
        env:
          C_USER: ${{ secrets.CRAVE_USERNAME }}
          C_TOKEN: ${{ secrets.CRAVE_TOKEN }}
        run: |
          # Create the EXACT structure you provided earlier
          # This includes the 'headers' object which might be what the tool is looking for
          python3 -c "import json, os; print(json.dumps({'username': os.environ['C_USER'], 'headers': {'Authorization': os.environ['C_TOKEN']}, 'server': 'https://foss.crave.io/api'}))" > ${HOME}/crave.conf
          cp ${HOME}/crave.conf ${HOME}/.crave.conf

      - name: Run Build
        run: |
          crave -c ${HOME}/crave.conf run --clean
