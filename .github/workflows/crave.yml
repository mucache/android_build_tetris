name: Crave ROM Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Crave
        run: |
          mkdir -p ${HOME}/bin
          curl -sL https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          sudo mv crave /usr/local/bin/crave

      - name: Create crave.conf
        env:
          C_USER: ${{ secrets.CRAVE_USERNAME }}
          C_TOKEN: ${{ secrets.CRAVE_TOKEN }}
        run: |
          # Use a Heredoc to ensure NO special characters are lost
          cat <<EOF > ${HOME}/crave.conf
          {
            "username": "$C_USER",
            "token": "$C_TOKEN",
            "server": "https://foss.crave.io/api"
          }
          EOF
          # Create the hidden version as well
          cp ${HOME}/crave.conf ${HOME}/.crave.conf

      - name: Run Build
        run: |
          # Check if the tool is alive first
          crave version || true
          # Run the build
          crave run --clean
