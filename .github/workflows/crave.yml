name: Crave ROM Builder

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Crave
        run: |
          mkdir -p ${HOME}/bin
          curl -sL https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          mv crave ${HOME}/bin/
          echo "${HOME}/bin" >> $GITHUB_PATH

      - name: Create crave.conf
        run: |
          echo "{
  "username": "${{ secrets.CRAVE_USERNAME }}",
  "token": "${{ secrets.CRAVE_TOKEN }}",
  "server": "https://foss.crave.io/api"
}" > crave.conf

      - name: Run Build
        run: |
          crave run --clean
