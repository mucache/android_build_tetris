name: Crave ROM Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Crave
        run: |
          mkdir -p ${HOME}/bin
          curl -sL https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          mv crave ${HOME}/bin/
          echo "${HOME}/bin" >> $GITHUB_PATH

      - name: Create crave.conf (Valid JSON Hack)
        env:
          C_USER: ${{ secrets.CRAVE_USERNAME }}
          C_TOKEN: ${{ secrets.CRAVE_TOKEN }}
        run: |
          python3 -c "import json, os; print(json.dumps({'''username''': os.environ['''C_USER'''], '''token''': os.environ['''C_TOKEN'''], '''server''': '''https://foss.crave.io/api'''}, indent=2))" > ${HOME}/crave.conf
          # Also put a copy in current dir just in case
          cp ${HOME}/crave.conf crave.conf

      - name: Run Build
        run: |
          # Run from home to ensure config detection
          cd ${HOME}
          crave run --clean --project ${GITHUB_WORKSPACE}/crave.yaml
