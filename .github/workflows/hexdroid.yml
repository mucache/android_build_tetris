name: Build on HexDroid

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger HexDroid Build
        env:
          HEXDROID_TOKEN: ${{ secrets.HEXDROID_TOKEN }}
        run: |
          # Added -i to see headers and server response
          curl -i -X POST -H "Authorization: Bearer $HEXDROID_TOKEN" \
               -H "Accept: application/json" \
               -H "Content-Type: application/json" \
               -d '{"project": "Tetris-Build", "branch": "main"}' \
               https://api.hexdroid.com/v1/builds
