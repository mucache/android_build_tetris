name: VoltageOS Build (2TB G-Drive)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Up Local Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libstdc++6 git wget python3
          curl -sL https://rclone.org/install.sh | sudo bash
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo

      - name: Setup Rclone
        env:
          RCLONE_CONF_BASE64: ${{ secrets.RCLONE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONF_BASE64" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Restore Source from G-Drive
        run: |
          mkdir -p ~/android/voltage
          # Only sync the .repo folder to save time and space
          # This allows us to "resume" the sync on the VM's local disk
          echo "Restoring .repo from Google Drive..."
          rclone sync gdrive:voltage/.repo ~/android/voltage/.repo -P --transfers 32 --checkers 64

      - name: Repo Sync
        run: |
          export PATH=$PATH:~/bin
          cd ~/android/voltage
          
          # Re-init in case of manifest changes
          repo init -u https://github.com/VoltageOS/manifest.git -b 15 --depth=1
          
          mkdir -p .repo/local_manifests
          cat <<EOF > .repo/local_manifests/tetris.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <project name="valt-x/device_nothing_tetris" path="device/nothing/Tetris" remote="github" revision="lineage-23.2" />
            <project name="valt-x/android_device_nothing_Tetris-kernel" path="device/nothing/Tetris-kernel" remote="github" revision="lineage-23.2" />
            <project name="valt-x/vendor_nothing_Tetris" path="vendor/nothing/Tetris" remote="github" revision="lineage-23.2" />
            <project name="SuperAviation001/android_hardware_mediatek" path="hardware/mediatek" remote="github" revision="lineage-22.2" />
          </manifest>
          EOF

          # Sync locally (Fastest way)
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Build ROM
        run: |
          export PATH=$PATH:~/bin
          cd ~/android/voltage
          source build/envsetup.sh
          lunch voltage_Tetris-userdebug
          
          # Use local CCACHE for this session
          export USE_CCACHE=1
          export CCACHE_DIR=~/android/ccache
          ccache -M 50G
          
          mka bacon -j$(nproc --all)

      - name: Save Progress to G-Drive
        if: always() # Run even if build fails so we don't lose synced code
        run: |
          echo "Uploading changes back to Google Drive..."
          # Sync back the .repo and ccache to G-Drive for the next build
          rclone sync ~/android/voltage/.repo gdrive:voltage/.repo -P --transfers 32 --checkers 64
          rclone sync ~/android/ccache gdrive:voltage/ccache -P --transfers 32 --checkers 64

      - name: Upload Finished ROM
        if: success()
        run: |
          cd ~/android/voltage/out/target/product/Tetris
          # Upload the final zip
          rclone copy voltage-*.zip gdrive:voltage/builds/ -P
          curl -s --upload-file voltage-*.zip https://transfer.sh/voltage-tetris.zip
