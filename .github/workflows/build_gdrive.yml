name: VoltageOS Build (2TB G-Drive)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Up Local Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libstdc++6 git wget python3 fuse3 libfuse2
          curl -sL https://rclone.org/install.sh | sudo bash
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          
          git config --global user.email "build@example.com"
          git config --global user.name "Builder"
          git config --global color.ui false

      - name: Setup Rclone & Mount Drive
        env:
          RCLONE_CONF_BASE64: ${{ secrets.RCLONE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONF_BASE64" | base64 -d > ~/.config/rclone/rclone.conf
          
          # Allow other users to access the mount
          sudo sed -i 's/#user_allow_other/user_allow_other/' /etc/fuse.conf
          
          mkdir -p ~/android
          
          # Mount with optimized VFS caching
          # --vfs-cache-mode writes: Needed for repo to work correctly
          # --vfs-cache-max-size 50G: Limits local cache so we don't hit the 80GB GitHub limit
          rclone mount gdrive: ~/android \
            --vfs-cache-mode writes \
            --vfs-cache-max-size 50G \
            --buffer-size 64M \
            --dir-cache-time 1000h \
            --attr-timeout 1000h \
            --allow-other \
            --vfs-read-chunk-size 32M \
            --vfs-read-chunk-size-limit 128M \
            --daemon
          
          # Wait for mount to appear
          for i in {1..20}; do
            if df -h | grep -q "gdrive:"; then
              echo "Drive mounted successfully!"
              break
            fi
            echo "Waiting for mount... ($i/20)"
            sleep 5
          done
          df -h

      - name: Repo Sync
        run: |
          export PATH=$PATH:~/bin
          cd ~/android
          mkdir -p voltage && cd voltage
          
          # Only init if not already initialized on G-Drive
          if [ ! -d ".repo" ]; then
            echo "Initializing repo..."
            repo init -u https://github.com/VoltageOS/manifest.git -b 15 --depth=1
          fi
          
          mkdir -p .repo/local_manifests
          cat <<EOF > .repo/local_manifests/tetris.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <remote name="github" fetch="https://github.com/" />

            <!-- THE EXTERMINATOR: SAVE SPACE ON DRIVE -->
            <remove-project name="platform/prebuilts/clang/host/darwin-x86" />
            <remove-project name="platform/prebuilts/gcc/linux-x86/host/x86_64-linux-glibc2.17-4.8" />
            <remove-project name="platform/prebuilts/python/darwin-x86" />
            <remove-project name="platform/prebuilts/go/darwin-x86" />
            <remove-project name="platform/device/google/cuttlefish" />
            <remove-project name="platform/prebuilts/android-emulator" />
            <remove-project name="platform/prebuilts/rust" />
            <remove-project name="platform/external/chromium-webview" />
            <remove-project name="platform/external/pdfium" />

            <!-- Tetris (CMF 1) Projects -->
            <project name="valt-x/device_nothing_tetris" path="device/nothing/Tetris" remote="github" revision="lineage-23.2" />
            <project name="valt-x/android_device_nothing_Tetris-kernel" path="device/nothing/Tetris-kernel" remote="github" revision="lineage-23.2" />
            <project name="valt-x/vendor_nothing_Tetris" path="vendor/nothing/Tetris" remote="github" revision="lineage-23.2" />
            <project name="SuperAviation001/android_hardware_mediatek" path="hardware/mediatek" remote="github" revision="lineage-22.2" />
          </manifest>
          EOF

          echo "Syncing source code..."
          # Sync with progress output to keep GHA runner alive
          repo sync -c -j4 --force-sync --no-clone-bundle --no-tags --quiet || repo sync -c -j1 --force-sync

      - name: Build ROM
        run: |
          export PATH=$PATH:~/bin
          cd ~/android/voltage
          source build/envsetup.sh
          lunch voltage_Tetris-userdebug
          
          # Use CCACHE on G-Drive
          export USE_CCACHE=1
          export CCACHE_DIR=~/android/ccache
          ccache -M 50G
          
          mka bacon -j$(nproc --all)

      - name: Upload Finished ROM
        if: success()
        run: |
          cd ~/android/voltage/out/target/product/Tetris
          # Copy zip to a builds folder on G-Drive
          rclone copy voltage-*.zip gdrive:voltage/builds/ -P
          # Also provide a temporary link
          curl -s --upload-file voltage-*.zip https://transfer.sh/voltage-tetris.zip
