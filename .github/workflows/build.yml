name: HexDroid Trigger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Force Start Build
        env:
          HEX_TOKEN: ${{ secrets.HEXDROID_TOKEN }}
        run: |
          python3 -c "
import http.client, json, os
conn = http.client.HTTPSConnection('api.hexdroid.com')
payload = json.dumps({'project': 'Tetris-Build', 'branch': 'main'})
headers = {
    'Authorization': f'Bearer {os.environ[''HEX_TOKEN'']}',
    'Content-Type': 'application/json',
    'Accept': 'application/json'
}
conn.request('POST', '/v1/builds', payload, headers)
res = conn.getresponse()
data = res.read()
print(f'Status: {res.status}')
print(f'Response: {data.decode()}')
if res.status not in [200, 201, 202]:
    exit(1)
"
