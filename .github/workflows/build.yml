name: Build VoltageOS 16.2 (Optimized)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 1024
          temp-reserve-mb: 512
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"

      - name: Checkout build config
        uses: actions/checkout@v4

      - name: Setup Build Tools
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          git config --global user.name "valt-x"
          git config --global user.email "valtaoi@example.com"

      - name: Sync Slim Manifest
        env:
          MY_KEY: ${{ secrets.GH_TOKEN }}
        run: |
          export PATH=$PATH:$HOME/bin
          repo init -u https://x-access-token:$MY_KEY@github.com/mucache/manifest.git -b 16.2 --depth=1 --partial-clone --clone-filter=blob:limit=10M --groups=all,-notdefault,-device,-darwin,-x86,-mips
          mkdir -p .repo/local_manifests
          cp $GITHUB_WORKSPACE/roomservice.xml .repo/local_manifests/tetris.xml
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --current-branch
          
          # HACK: Manual deletion of huge folders to free up 60GB before building
          echo "Deleting huge unneeded folders..."
          rm -rf .repo
          rm -rf external/chromium-webview
          rm -rf prebuilts/rust
          rm -rf prebuilts/go
          rm -rf prebuilts/gcc
          rm -rf external/pdfium

      - name: Build ROM (Fast Mode)
        run: |
          source build/envsetup.sh
          lunch lineage_Tetris-userdebug
          export WITH_DEXPREOPT=false
          mka bacon -j$(nproc --all)

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: VoltageOS-Tetris-Slim
          path: out/target/product/Tetris/VoltageOS*.zip
