name: HexDroid Surface Build

on:
  workflow_dispatch:

jobs:
  surface-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout local blueprints
        uses: actions/checkout@v4

      - name: Install HexDroid Surface CLI (hexd)
        run: |
          curl -sL https://hexdroid.com/api/v1/cli/install | bash
          sudo mv hexd /usr/local/bin/hexd

      - name: Surface to Cloud
        env:
          HEX_edgeKey: ${{ secrets.HEXDROID_TOKEN }}
        run: |
          # Surface the current directory to HexDroid servers
          # --metrics=1 enables live tracking on your dashboard
          # The build will follow the instructions in hexdroid.yaml
          hexd --surface --project Tetris-Build --metrics=1 --selinux=1
