name: Build VoltageOS 16.2 (Tetris)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout build config
        uses: actions/checkout@v4

      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 1024
          temp-reserve-mb: 512
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"

      - name: Setup Repo & Git
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          git config --global user.name "valt-x"
          git config --global user.email "valtaoi@example.com"

      - name: Sync Manifest
        env:
          MY_KEY: ${{ secrets.GH_TOKEN }}
        run: |
          export PATH=$PATH:$HOME/bin
          # Shallow clone to save maximum space
          repo init -u https://x-access-token:$MY_KEY@github.com/mucache/manifest.git -b 16.2 --depth=1
          
          mkdir -p .repo/local_manifests
          cp $GITHUB_WORKSPACE/roomservice.xml .repo/local_manifests/tetris.xml
          
          # Very lean sync
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --current-branch

      - name: Build ROM
        run: |
          source build/envsetup.sh
          lunch lineage_Tetris-userdebug
          mka bacon -j$(nproc --all)

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: VoltageOS-16.2-Tetris
          path: out/target/product/Tetris/VoltageOS*.zip
